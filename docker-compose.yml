version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: rentflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rentflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:rentflow_password@db:5432/rentflow
      - DEBUG=1
      - SECRET_KEY=development-secret-key-replace-me
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
